<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>שומרי התבלין — קישורי תחנות</title><link rel="stylesheet" href="style.css"></head><body><main class="app"><section class="screen"><h1 style="font-size:44px">קישורי תחנות</h1><p class="subtitle">העלו את התיקייה לשרת, פתחו את העמוד הזה, והעתיקו את הקישורים ליצירת QR.</p><div class="stack" id="links"></div><button class="btn secondary" onclick="localStorage.clear();alert('נוקה')">איפוס שמירה מקומית</button></section></main><script src="data.js"></script><script>const base=location.href.replace(/master\.html.*$/,'index.html');const el=document.getElementById('links');GAME_DATA.stations.forEach(id=>{const c=GAME_DATA.creatures[id].he;const url=base+'?station='+id;el.innerHTML+=`<div class="card"><b>${c.name} · ${c.place}</b><div class="links">${url}</div></div>`});</script></body></html>
