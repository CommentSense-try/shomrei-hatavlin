<style>
  #logoSplash {
    position: fixed; inset: 0; z-index: 99999;
    background:
      radial-gradient(900px 420px at 50% -8%, #fdf9f0, transparent),
      radial-gradient(700px 500px at -10% 30%, #e9dfc9, transparent 60%),
      radial-gradient(700px 500px at 110% 75%, #eadfc8, transparent 60%),
      #f3ecdd;
    display: flex; align-items: center; justify-content: center;
    transition: opacity .6s ease;
  }
  #logoSplash.hide { opacity: 0; pointer-events: none; }
  #logoSplash .splash-inner {
    position: relative; width: min(86vw, 440px);
  }
  #logoSplash img {
    width: 100%; height: auto; display: block;
    clip-path: inset(100% 0 0 0);
    filter: blur(6px);
    transform: translateY(22px) scale(.96);
    opacity: 0;
    animation:
      splashGrow 2.2s cubic-bezier(.25,.6,.25,1) .2s forwards,
      splashSettle .9s ease-out 2.4s forwards;
  }
  @keyframes splashGrow {
    0%   { clip-path: inset(100% 0 0 0); opacity: 0; filter: blur(6px); transform: translateY(22px) scale(.96); }
    12%  { opacity: 1; }
    55%  { filter: blur(2px); }
    100% { clip-path: inset(0 0 0 0); opacity: 1; filter: blur(0); transform: translateY(0) scale(1); }
  }
  @keyframes splashSettle {
    0% { transform: scale(1); } 40% { transform: scale(1.02); } 100% { transform: scale(1); }
  }
  #logoSplash .splash-glow {
    position: absolute; left: 6%; right: 6%; height: 3px;
    background: linear-gradient(90deg, transparent, #8a9b4d 20%, #c9b96a 50%, #8a9b4d 80%, transparent);
    border-radius: 99px; top: 100%; opacity: 0;
    animation: splashSweep 2.2s cubic-bezier(.25,.6,.25,1) .2s forwards;
    pointer-events: none;
  }
  @keyframes splashSweep {
    0% { top: 100%; opacity: 0; } 10% { opacity: .9; } 85% { opacity: .9; } 100% { top: -2%; opacity: 0; }
  }
  @media (prefers-reduced-motion: reduce) {
    #logoSplash img { animation: none; clip-path: none; filter: none; transform: none; opacity: 1; }
    #logoSplash .splash-glow { display: none; }
  }
</style>
<script>
(function () {
  var splash = document.getElementById('logoSplash');
  // הפתיח מוצג רק בכניסה הראשית — בתחנות (?station=...) הוא מוסר מיד
  if (new URLSearchParams(location.search).has('station')) {
    splash.remove();
    return;
  }
  function dismiss() {
    if (!splash || splash.classList.contains('hide')) return;
    splash.classList.add('hide');
    setTimeout(function () { splash.remove(); }, 700);
  }
  // סיום אוטומטי אחרי האנימציה
  setTimeout(dismiss, 3400);
  // נגיעה בכל מקום מדלגת — חשוב במשחק תחנות עם סריקות חוזרות
  splash.addEventListener('click', dismiss);
})();
</script>

<div class="wrap"><h1>שומרי התבלין — קישורי תחנות</h1><p>השתמש בקישורים האלה ליצירת QR לכל תחנה.</p><div id="main"></div><div id="links"></div></div><script>const CTA='היצורים נעלמו. סרקו, התחילו במסע ועזרו למצוא את שומרי התבלין.';const stations={tatzpit:'התצפית / אווירון',shomera:'שומרה / שומרון',beitbad:'בית בד / זייתון',gat:'גת / גתון',goren:'גורן / דישון',bor:'בור מים / בורי'};const base=location.origin+location.pathname.replace(/master\.html$/,'');function qrUrl(u){return 'https://api.qrserver.com/v1/create-qr-code/?size=900x900&data='+encodeURIComponent(u);}function card(title,u,isMain){return `<div class="card${isMain?' main':''}"><h2>${title}</h2><a href="${u}" target="_blank">${u}</a><br><button onclick="window.open('${qrUrl(u)}','_blank')">הצג QR</button><button onclick="navigator.clipboard.writeText('${u}')">העתק קישור</button></div>`;}document.getElementById('main').innerHTML=card(CTA,base,true);document.getElementById('links').innerHTML=Object.entries(stations).map(([k,v])=>{const u=base+'?station='+k;return card(v,u,false);}).join('');</script></body></html>
